<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>大自然遊樂園</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&family=Chocolate+Classical+Sans&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg0: #07060a;
            --bg1: #0e0b12;
            --ink: #f2efe7;
            --muted: #cfc7b5;
            --gold: #d7b35d;
            --clay: #b07a5a;
            --ok: #6bd17c;
            --danger: #ff6666;
            --card: rgba(18, 14, 22, .78);
            --card2: rgba(22, 17, 28, .78);
            --stroke: rgba(215, 179, 93, .22);
            --blur: blur(10px);
            --radius: 18px;
            --radius2: 26px;
            --max: 900px;
            --gradient-warm-135: linear-gradient(135deg, #F89938 0%, #F1495A 50%, #973B9F 100%);
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            color: var(--ink);
            font-family: 'Chiron GoRound TC', sans-serif;
            background: radial-gradient(1200px 800px at 20% 10%, rgba(215, 179, 93, .08), transparent 55%),
                linear-gradient(180deg, var(--bg0), var(--bg1) 40%, #06050a 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        body:before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: url("https://images.unsplash.com/photo-1528825871115-3581a5387919?auto=format&fit=crop&w=1600&q=60");
            opacity: .04;
            mix-blend-mode: overlay;
            z-index: -1;
        }

        a {
            color: var(--gold);
            text-decoration: none
        }

        /* 導覽列 */
        .nav {
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 12px 0;
            backdrop-filter: var(--blur);
            background: linear-gradient(180deg, rgba(6, 5, 10, .86), rgba(6, 5, 10, .44));
            border-bottom: 1px solid var(--stroke);
        }

        .navInner {
            max-width: var(--max);
            margin: 0 auto;
            padding: 0 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .brand {
            font-weight: 700;
            font-size: 18px;
            color: var(--gold);
        }

        .navLinks {
            display: flex;
            gap: 10px;
        }

        .chip {
            padding: 6px 12px;
            border-radius: 99px;
            border: 1px solid var(--stroke);
            background: rgba(18, 14, 22, .45);
            color: var(--ink);
            font-size: 13px;
            transition: 0.2s;
        }

        .chip:hover {
            background: rgba(18, 14, 22, .8);
            border-color: var(--gold);
        }

        .player-info {
            font-size: 16px;
            font-weight: bold;
            color: var(--gold);
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid var(--stroke);
            display: block;
        }

        .wrap {
            max-width: var(--max);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin: 0 auto;
            padding: 24px 18px 90px
        }
        .block1{
            color:var(--gold); display: inline-flex; align-items: center; gap: 10px; font-weight: bold; letter-spacing: 0.2em;
            margin-bottom: 28px; opacity: 0; animation: fadeUp 0.8s 0.2s forwards;
        }
        .block1::before { content: ''; display: block; width: 32px; height: 2px; background: var(--gold); -webkit-text-fill-color: transparent; }
        .block1::after { content: ''; display: block; width: 32px; height: 2px; background: var(--gold); -webkit-text-fill-color: transparent; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

        /* 區塊樣式 */
        section {
            margin-top: 24px;
            border-radius: var(--radius2);
            background: linear-gradient(180deg, rgba(18, 14, 22, .76), rgba(18, 14, 22, .55));
            border: 1px solid var(--stroke);
            box-shadow: 0 18px 60px rgba(0, 0, 0, .55);
            backdrop-filter: var(--blur);
            padding: 24px;
            scroll-margin-top: 80px;
        }

        .secTitle {
            color: var(--ink);
            font-size: 28px;
            margin: 0 0 8px;
            color: var(--ink);
        }

        .subtitle {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--muted);
            font-size: 16px;
            margin: 0 0 0px;
        }

        .subtitle::before { 
            content: ''; 
            display: block; 
            width: 24px; 
            height: 1px; 
            background: var(--muted); 
            -webkit-text-fill-color: transparent; 
        }

        /* 圖片庫 */
        .img-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .img-card {
            background: rgba(0, 0, 0, .3);
            overflow: hidden;
            padding: 10px;
            text-align: center;
        }

        .img-card img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 8px;
            aspect-ratio: 16/9;
            object-fit: cover;
        }

        .img-card p {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        /* 題目樣式 */
        .question-card {
            background: rgba(0, 0, 0, .2);
            border: 1px solid var(--stroke);
            border-radius: 16px;
            padding: 20px;
            margin-top: 16px;
            transition: 0.3s;
            position: relative;
        }

        .question-card.disabled {
            opacity: 0.6;
            pointer-events: none;
            filter: grayscale(50%);
        }

        .question-card.active {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(215, 179, 93, .2);
        }

        .question-card.revealed {
            border-color: var(--ok);
        }

        .q-status {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 99px;
            background: rgba(255, 255, 255, 0.1);
        }

        .active .q-status {
            background: rgba(215, 179, 93, .2);
            color: var(--gold);
        }

        .revealed .q-status {
            background: rgba(107, 209, 124, .2);
            color: var(--ok);
        }

        .q-text {
            font-size: 18px;
            margin-top: 10px;
        }

        .option-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, .05);
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 10px;
            border: 1px solid transparent;
        }

        .option-row.correct {
            border-color: var(--ok);
            background: rgba(107, 209, 124, .1);
        }

        .option-row.wrong {
            opacity: 0.5;
        }

        .bet-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--stroke);
            color: #fff;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-circle:hover {
            background: var(--gold);
            color: #000;
        }

        .bet-val {
            width: 40px;
            text-align: center;
            font-weight: bold;
            color: var(--gold);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(145deg, rgba(215, 179, 93, .92), rgba(184, 144, 58, .62));
            color: #000;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
            cursor: pointer;
        }

        .btn-submit:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }

        .secProblem{
            margin-top: 24px;
        }

        /* 登入與裁判介面 */
        #loginModal {
            position: fixed;
            inset: 0;
            background: var(--bg0);
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        input {
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--stroke);
            background: #111;
            color: #fff;
            font-size: 16px;
            width: 300px;
            margin-bottom: 15px;
            text-align: center;
        }

        .refPanel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--card2);
            padding: 16px;
            border: 1px solid var(--gold);
            border-radius: 12px;
            z-index: 9999;
            display: none;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>

<body>

    <!-- 登入介面 -->
    <div id="loginModal">
        <h1 style="color:var(--gold);">大自然遊樂園</h1>
        <p>請輸入暱稱進入遊戲（裁判請輸入密碼）</p>
        <input type="text" id="loginInput" placeholder="暱稱 / 密碼">
        <button class="btn-submit" style="width:300px;" onclick="joinGame()">進入遊樂園</button>
    </div>

    <!-- 裁判控制台 -->
    <div class="refPanel" id="refPanel">
        <h3 style="margin:0; color:var(--gold); text-align:center;">👑 裁判控制台</h3>
        <select id="refQSelect"
            style="padding:8px; border-radius:8px; background:#111; color:#fff; border:1px solid var(--gold);">
        </select>
        <button class="btn-submit" onclick="refOpenBet()">開放作答</button>
        <button class="btn-submit" style="background:var(--danger); color:#fff;" onclick="refReveal()">結束下注並結算</button>
    </div>

    <!-- 導覽 -->
    <div class="nav">
        <div class="navInner">
            <div class="brand">大自然遊樂園</div>
            <div class="navLinks">
                <a href="#section1" class="chip">地球奇觀區</a>
            </div>
            <div class="player-info" id="playerInfo">
                👤 <span id="playerName"></span> | 💰 <span id="playerChips">1000</span>
            </div>
        </div>
    </div>


    <div class="wrap">
        <h1 class="block1">地球奇觀區</h1>
        <section id="section1">
            <h1 class="secTitle">月球登陸計畫</h1>
            <p class="subtitle">探索大自然最神秘的角落，從深海到宇宙</p>
            <p style="line-height: 1.8; color: var(--muted);">
                歡迎來到地球奇觀區。在這裡，我們將帶領各位認識地球上最極端的環境。請仔細觀察下方的生態圖集，這將有助於你在稍後的挑戰區中獲得勝利。
            </p>
            <div class="img-grid">
                <div class="img-card">
                    <img src="https://images.unsplash.com/photo-1518837695005-2083093ee35b?auto=format&fit=crop&w=600&q=80"
                        alt="海洋">
                    <p>深海熱泉生態系，在無光的環境中依然生機盎然。</p>
                </div>
                <div class="img-card">
                    <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=600&q=80"
                        alt="高山">
                    <p>高山凍原，植物為了抵禦寒風演化出緊貼地面的型態。</p>
                </div>
            </div>
            <div class="secProblem">
                <h1 class="secTitle">知識挑戰區</h1>
                <p class="subtitle">請等待裁判開放題目，下注後請務必點擊「確認下注」</p>
                <div id="questions-container"></div>
            </div>
        </section>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>

</html>
